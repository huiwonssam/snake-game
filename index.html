<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심플 뱀게임 (Snake Game)</title>
    <style>
        /* CSS: 게임의 스타일을 담당 */
        body {
            background-color: #2c3e50; /* 어두운 배경 */
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 { margin-bottom: 10px; }

        #scoreBoard {
            font-size: 24px;
            margin-bottom: 10px;
        }

        canvas {
            background-color: #ecf0f1; /* 게임판 배경 */
            border: 5px solid #bdc3c7;
            border-radius: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            /* 모바일에서 터치 시 화면 스크롤 방지 */
            touch-action: none; 
        }
    </style>
</head>
<body>

    <h1>S N A K E</h1>
    <div id="scoreBoard">점수: <span id="score">0</span></div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>

<script>
    // JS: 게임의 로직을 담당
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");

    // 게임 설정
    const gridSize = 20; // 한 칸의 크기
    const tileCount = canvas.width / gridSize; // 가로/세로 칸 수 (20x20)
    let score = 0;
    let gameInterval;

    // 뱀 정보
    let snake = [];
    let food = { x: 10, y: 10 };
    
    // 이동 방향 (속도)
    let dx = 0;
    let dy = 0;

    // 게임 초기화
    function initGame() {
        // 뱀 시작 위치 (가운데)
        snake = [
            { x: 10, y: 10 },
            { x: 9, y: 10 },
            { x: 8, y: 10 }
        ];
        score = 0;
        dx = 1; // 시작하자마자 오른쪽으로 이동
        dy = 0;
        scoreElement.innerText = score;
        placeFood();
        clearInterval(gameInterval);
        // 게임 속도 설정 (100ms마다 그리기) - 숫자가 낮을수록 빠름
        gameInterval = setInterval(gameLoop, 100); 
    }

    // 게임 주 루프 (반복 실행됨)
    function gameLoop() {
        update();
        draw();
    }

    // 데이터 업데이트 (이동, 충돌 감지)
    function update() {
        // 머리 방향으로 새로운 머리 위치 계산
        const head = { x: snake[0].x + dx, y: snake[0].y + dy };

        // 충돌 처리 1: 벽에 부딪혔을 때
        if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
            gameOver();
            return;
        }

        // 충돌 처리 2: 자기 몸에 부딪혔을 때
        for (let i = 0; i < snake.length; i++) {
            if (head.x === snake[i].x && head.y === snake[i].y) {
                gameOver();
                return;
            }
        }

        // 뱀 배열 맨 앞에 새로운 머리 추가
        snake.unshift(head);

        // 음식 먹었는지 확인
        if (head.x === food.x && head.y === food.y) {
            score += 10;
            scoreElement.innerText = score;
            placeFood(); // 새로운 음식 배치
            // 꼬리를 자르지 않아 뱀이 길어짐
        } else {
            // 음식을 안 먹었으면 꼬리를 잘라내어 이동 효과를 냄
            snake.pop();
        }
    }

    // 화면 그리기
    function draw() {
        // 배경 지우기
        ctx.fillStyle = "#ecf0f1";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 음식 그리기
        ctx.fillStyle = "#e74c3c"; // 빨간색
        ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);

        // 뱀 그리기
        ctx.fillStyle = "#2ecc71"; // 초록색
        snake.forEach((part, index) => {
            // 머리는 약간 더 어두운 초록색으로
            if (index === 0) ctx.fillStyle = "#27ae60";
            else ctx.fillStyle = "#2ecc71";

            ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
        });
    }

    // 음식 랜덤 배치
    function placeFood() {
        food.x = Math.floor(Math.random() * tileCount);
        food.y = Math.floor(Math.random() * tileCount);

        // 음식 위치가 뱀 몸통 위라면 다시 배치
        for (let part of snake) {
            if (part.x === food.x && part.y === food.y) {
                placeFood();
            }
        }
    }

    function gameOver() {
        clearInterval(gameInterval);
        alert("GAME OVER!\n최종 점수: " + score);
        initGame(); // 게임 재시작
    }

    // 키보드 입력 처리
    document.addEventListener("keydown", changeDirection);

    function changeDirection(event
